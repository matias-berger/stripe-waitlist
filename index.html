<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Waitlist · Stripe Shuttle</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      background: #f5f4f0; color: #1a1a1a;
      min-height: 100vh; display: flex;
      align-items: flex-start; justify-content: center;
      padding: 2rem 1rem 4rem;
    }
    .wrap { width: 100%; max-width: 500px; }
    .header { text-align: center; margin-bottom: 2rem; }
    h1 { font-size: 24px; font-weight: 600; color: #111; margin-bottom: 0.4rem; }
    .sub { font-size: 14px; color: #666; line-height: 1.5; }
    .card { background: #fff; border: 1px solid #e8e6e0; border-radius: 12px; padding: 1.25rem; margin-bottom: 1rem; }
    .field-label { font-size: 13px; font-weight: 500; color: #555; display: block; margin-bottom: 6px; }
    .field-row { margin-bottom: 1rem; }
    .field-row:last-child { margin-bottom: 0; }
    input[type=text], input[type=email], input[type=tel], input[type=password], select {
      width: 100%; padding: 9px 12px; border: 1px solid #ddd; border-radius: 8px;
      font-size: 14px; color: #111; background: #fafafa; outline: none; transition: border-color 0.15s;
    }
    input:focus, select:focus { border-color: #4A90D9; background: #fff; }
    .section-label { font-size: 13px; font-weight: 500; color: #555; margin-bottom: 10px; display: block; }
    .trip-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
    .trip-option { border: 1px solid #e0ddd8; border-radius: 8px; padding: 12px 8px; cursor: pointer; text-align: center; transition: border-color 0.15s, background 0.15s; user-select: none; }
    .trip-option:hover { border-color: #bbb; }
    .trip-option.selected { border: 2px solid #4A90D9; background: #EBF4FD; }
    .trip-time { font-size: 15px; font-weight: 600; color: #111; display: block; }
    .trip-option.selected .trip-time { color: #185FA5; }
    .stop-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .stop-option { border: 1px solid #e0ddd8; border-radius: 8px; padding: 12px 12px; cursor: pointer; transition: border-color 0.15s, background 0.15s; user-select: none; }
    .stop-option:hover { border-color: #bbb; }
    .stop-option.selected { border: 2px solid #4A90D9; background: #EBF4FD; }
    .stop-name { font-size: 13px; font-weight: 500; color: #111; display: block; }
    .stop-option.selected .stop-name { color: #185FA5; }
    .submit-btn { width: 100%; padding: 13px; background: #185FA5; color: #fff; border: none; border-radius: 8px; font-size: 15px; font-weight: 500; cursor: pointer; transition: background 0.15s; margin-top: 0.5rem; }
    .submit-btn:hover { background: #0C447C; }
    .submit-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .note { font-size: 12px; color: #aaa; text-align: center; margin-top: 0.75rem; }
    .success-card { text-align: center; padding: 2.5rem 1.5rem; }
    .check-circle { width: 56px; height: 56px; border-radius: 50%; background: #E3F2D4; display: flex; align-items: center; justify-content: center; margin: 0 auto 1.25rem; }
    .success-title { font-size: 20px; font-weight: 600; color: #111; margin-bottom: 0.4rem; }
    .success-sub { font-size: 14px; color: #666; line-height: 1.5; margin-bottom: 1.25rem; }
    .position-badge { background: #f5f4f0; border-radius: 10px; padding: 0.85rem 1rem; margin-bottom: 1rem; }
    .pos-num { font-size: 30px; font-weight: 600; color: #111; display: block; }
    .pos-label { font-size: 12px; color: #888; }
    .conf-detail { font-size: 13px; color: #555; margin: 3px 0; }
    .error-msg { font-size: 13px; color: #993C1D; background: #FDE8E1; border-radius: 8px; padding: 10px 14px; margin-top: 0.75rem; text-align: center; display: none; }

    /* Admin */
    .admin-login { max-width: 340px; margin: 4rem auto; }
    .admin-login h2 { font-size: 20px; font-weight: 600; margin-bottom: 1.5rem; text-align: center; }
    .admin-wrap { max-width: 760px; margin: 0 auto; padding: 0 0.5rem; }
    .admin-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.5rem; }
    .admin-header h2 { font-size: 20px; font-weight: 600; }
    .admin-logout { font-size: 13px; color: #888; cursor: pointer; text-decoration: underline; background: none; border: none; }
    .admin-tabs { display: flex; gap: 8px; margin-bottom: 1rem; flex-wrap: wrap; }
    .tab-btn { padding: 7px 16px; border: 1px solid #e0ddd8; border-radius: 20px; font-size: 13px; font-weight: 500; cursor: pointer; background: #fff; color: #555; transition: all 0.15s; }
    .tab-btn.active { background: #185FA5; color: #fff; border-color: #185FA5; }
    .admin-table { width: 100%; border-collapse: collapse; font-size: 13px; }
    .admin-table th { text-align: left; padding: 8px 12px; border-bottom: 2px solid #e8e6e0; font-weight: 500; color: #555; }
    .admin-table td { padding: 10px 12px; border-bottom: 1px solid #f0ede8; color: #222; word-break: break-word; }
    .admin-table tr:last-child td { border-bottom: none; }
    .empty-state { text-align: center; padding: 2rem; color: #aaa; font-size: 14px; }
    .count-bar { display: flex; gap: 10px; margin-bottom: 1rem; }
    .count-chip { background: #fff; border: 1px solid #e8e6e0; border-radius: 8px; padding: 0.6rem 1rem; flex: 1; text-align: center; }
    .count-num { font-size: 22px; font-weight: 600; color: #111; display: block; }
    .count-label { font-size: 11px; color: #888; }
    .loading { text-align: center; padding: 2rem; color: #aaa; font-size: 14px; }
    .action-btn { padding: 5px 10px; border-radius: 6px; font-size: 12px; font-weight: 500; cursor: pointer; border: 1px solid; transition: opacity 0.15s; white-space: nowrap; }
    .action-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn-notify { background: #EBF4FD; color: #185FA5; border-color: #b5d4f4; }
    .btn-voucher { background: #E3F2D4; color: #3B6D11; border-color: #c0dd97; }
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.45); display: flex; align-items: center; justify-content: center; z-index: 100; }
    .modal-box { background: #fff; border-radius: 12px; padding: 1.5rem; width: 90%; max-width: 420px; }
    .modal-title { font-size: 16px; font-weight: 600; margin-bottom: 1rem; }
    .modal-actions { display: flex; gap: 8px; margin-top: 1rem; justify-content: flex-end; }
    .btn-cancel { padding: 8px 16px; border-radius: 6px; font-size: 13px; cursor: pointer; background: #f5f4f0; border: 1px solid #e0ddd8; }
    .btn-confirm { padding: 8px 16px; border-radius: 6px; font-size: 13px; cursor: pointer; background: #185FA5; color: #fff; border: none; font-weight: 500; }
    @media (max-width: 420px) { .trip-grid { grid-template-columns: 1fr; } .count-bar { flex-wrap: wrap; } }
  </style>
</head>

  async function sbFetch(path, options = {}) {
    const res = await fetch(SUPABASE_URL + '/rest/v1/' + path, {
      ...options,
      headers: {
        'apikey': SUPABASE_KEY,
        'Authorization': 'Bearer ' + SUPABASE_KEY,
        'Content-Type': 'application/json',
        'Prefer': options.prefer || '',
        ...(options.headers || {})
      }
    });
    if (!res.ok) throw new Error(await res.text());
    const text = await res.text();
    return text ? JSON.parse(text) : null;
  }

  async function insertSignup(data) {
    return sbFetch('waitlist', {
      method: 'POST',
      prefer: 'return=representation',
      body: JSON.stringify(data)
    });
  }

  async function fetchWaitlist() {
    return sbFetch('waitlist?select=*&order=created_at.asc');

  function getView() {
    return location.hash === '#admin' ? 'admin-gate' : 'form';

    else if (v === 'admin-gate') app.innerHTML = sessionStorage.getItem('admin_ok') ? adminHTML() : adminLoginHTML();
    attachEvents();
  }

          <div class="trip-option${selectedTrip==='5:40 PM'?' selected':''}" id="trip-540pm"><span class="trip-time">5:40 PM</span></div>
          <div class="trip-option${selectedTrip==='7:10 PM'?' selected':''}" id="trip-710pm"><span class="trip-time">7:10 PM</span></div>
        </div>
      </div>
      <div class="card">
        <span class="section-label">Stop</span>
        <div class="stop-grid">
          <div class="stop-option${selectedStop==='Arguello Blvd & Geary Blvd'?' selected':''}" id="opt-1"><span class="stop-name">Arguello & Geary</span></div>
          <div class="stop-option${selectedStop==='Divisadero St & Eddy St'?' selected':''}" id="opt-2"><span class="stop-name">Divisadero & Eddy</span></div>
          <div class="stop-option${selectedStop==='Divisadero St & Haight St'?' selected':''}" id="opt-3"><span class="stop-name">Divisadero & Haight</span></div>
          <div class="stop-option${selectedStop==='14th St & Belcher St'?' selected':''}" id="opt-4"><span class="stop-name">14th & Belcher</span></div>
        </div>
      </div>
      <button class="submit-btn" id="submit-btn">Add me to the waitlist</button>
      <div class="error-msg" id="error-msg">Something went wrong. Please try again.</div>
      <p class="note">We'll email you if a seat opens up. No spam.</p>
    </div>`;
  }

  function successHTML(extra) {
    return `
    <div class="wrap">
      <div class="card success-card">
        <div class="check-circle">
          <svg width="26" height="26" viewBox="0 0 26 26" fill="none"><path d="M5 13.5l5.5 5.5 10.5-10.5" stroke="#3B6D11" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </div>
        <p class="success-title">You're on the list!</p>
        <p class="success-sub">We'll email <strong>${extra.email}</strong> if a seat opens up.</p>
        <div class="position-badge">
          <span class="pos-num">#${extra.pos}</span>
          <span class="pos-label">your position on the waitlist</span>
        </div>
        <p class="conf-detail">Departure: <strong>${extra.trip}</strong></p>
        <p class="conf-detail">Stop: <strong>${extra.stop}</strong></p>
      </div>
      <p class="note">Questions? Reach out to your shuttle coordinator.</p>
    </div>`;
  }

  function adminLoginHTML() {
    return `
    <div class="wrap admin-login">
      <h2>Admin access</h2>
      <div class="card">
        <div class="field-row" style="margin-bottom:0">
          <label class="field-label">Password</label>
          <input type="password" id="admin-pass" placeholder="Enter password" />
        </div>
      </div>
      <button class="submit-btn" id="admin-login-btn">Sign in</button>
      <div class="error-msg" id="login-error">Incorrect password.</div>
    </div>`;
  }

  function adminHTML() {
    const tabs = ['4:00 PM', '5:40 PM', '7:10 PM'];
    const filtered = adminData.filter(e => e.trip === adminTab);

    const rows = adminLoading
      ? `<tr><td colspan="5" class="loading">Loading...</td></tr>`
      : filtered.length
        ? filtered.map((e, i) => `
          <tr>
            <td>${i + 1}</td>
            <td>${e.name}</td>
            <td>${e.email}</td>
            <td>${e.phone}</td>
            <td>${e.stop}</td>
            <td>${new Date(e.created_at).toLocaleDateString()}</td>
          </tr>`).join('')
        : `<tr><td colspan="6" class="empty-state">No signups yet for this departure.</td></tr>`;

    const tabBtns = tabs.map(t => `<button class="tab-btn${t === adminTab ? ' active' : ''}" data-tab="${t}">${t} <span style="opacity:0.6;font-weight:400;">(${adminData.filter(e=>e.trip===t).length})</span></button>`).join('');

    const counts = tabs.map(t => {
      const n = adminData.filter(e => e.trip === t).length;
      return `<div class="count-chip"><span class="count-num">${n}</span><span class="count-label">${t}</span></div>`;
    }).join('');

    return `
    <div class="admin-wrap">
      <div class="admin-header">
        <h2>Waitlist</h2>
        <div style="display:flex;gap:12px;align-items:center;">
          <button class="tab-btn" id="refresh-btn" style="border-color:#ddd;">↻ Refresh</button>
          <button class="admin-logout" id="admin-logout">Sign out</button>
        </div>
      </div>
      <div class="count-bar">${counts}</div>
      <div class="admin-tabs">${tabBtns}</div>
      <div class="card" style="padding:0;overflow:hidden;overflow-x:auto;">
        <table class="admin-table">
          <thead><tr><th>#</th><th>Name</th><th>Email</th><th>Phone</th><th>Stop</th><th>Date</th><th>Actions</th></tr></thead>
          <tbody>${rows}</tbody>
        </table>
      </div>
    </div>`;
  }

  async function loadAdmin() {
    const tbody = document.querySelector(".admin-table tbody");
    if (tbody) tbody.innerHTML = "<tr><td colspan=\"6\" class=\"loading\">Loading...</td></tr>";
    adminLoading = true;
    try {
      adminData = await fetchWaitlist();
    } catch(e) {
      adminData = [];
    }
    adminLoading = false;
    render('admin-gate');
  }

  function attachEvents() {
    // Trip
    ['4pm','540pm','710pm'].forEach(id => {
      const el = document.getElementById('trip-' + id);
      if (el) el.onclick = () => {
        selectedTrip = el.querySelector('.trip-time').textContent;
        document.querySelectorAll('.trip-option').forEach(o => { o.classList.remove('selected'); o.querySelector('.trip-time').style.color = ''; });
        el.classList.add('selected');
        el.querySelector('.trip-time').style.color = '#185FA5';
      };
    });
    // Stop
    [['opt-1','Arguello Blvd & Geary Blvd'],['opt-2','Divisadero St & Eddy St'],['opt-3','Divisadero St & Haight St'],['opt-4','14th St & Belcher St']].forEach(([id, val]) => {
      const el = document.getElementById(id);
      if (el) el.onclick = () => {
        selectedStop = val;
        document.querySelectorAll('.stop-option').forEach(o => { o.classList.remove('selected'); o.querySelector('.stop-name').style.color = ''; });
        el.classList.add('selected');
        el.querySelector('.stop-name').style.color = '#185FA5';
      };
    });
    // Submit
    const submitBtn = document.getElementById('submit-btn');
    if (submitBtn) submitBtn.onclick = submitForm;
    // Admin login
    const loginBtn = document.getElementById('admin-login-btn');
    if (loginBtn) loginBtn.onclick = tryAdminLogin;
    const passInput = document.getElementById('admin-pass');
    if (passInput) passInput.onkeydown = e => { if (e.key === 'Enter') tryAdminLogin(); };
    // Tabs
    document.querySelectorAll('.tab-btn[data-tab]').forEach(btn => {
      btn.onclick = () => { adminTab = btn.dataset.tab; render('admin-gate'); };
    });
    // Refresh
    const refreshBtn = document.getElementById('refresh-btn');
    if (refreshBtn) refreshBtn.onclick = loadAdmin;
    // Logout
    const logoutBtn = document.getElementById('admin-logout');
    if (logoutBtn) logoutBtn.onclick = () => { sessionStorage.removeItem('admin_ok'); location.hash = ''; render('form'); };
  }

  function tryAdminLogin() {
    const val = document.getElementById('admin-pass').value;
    if (val === ADMIN_PASS) {
      sessionStorage.setItem('admin_ok', '1');
      render('admin-gate');
      loadAdmin();
    } else {
      document.getElementById('login-error').style.display = 'block';
    }
  }

  async function submitForm() {
    const name = document.getElementById('name').value.trim();
    const email = document.getElementById('email').value.trim();
    const phone = document.getElementById('phone').value.trim();
    const errorEl = document.getElementById('error-msg');
    errorEl.style.display = 'none';

    if (!name || !email || !phone || !selectedTrip || !selectedStop) {
      alert('Please fill in all fields and select a departure time and stop.');
      return;
    }
    if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
      alert('Please enter a valid email address.');
      return;
    }

    const btn = document.getElementById('submit-btn');
    btn.disabled = true;
    btn.textContent = 'Submitting…';

    try {
      const existing = await sbFetch(`waitlist?email=eq.${encodeURIComponent(email)}&trip=eq.${encodeURIComponent(selectedTrip)}&select=id`);
      if (existing && existing.length > 0) {
        alert('This email is already on the waitlist for that departure.');
        btn.disabled = false;
        btn.textContent = 'Add me to the waitlist';
        return;
      }

      await insertSignup({ name, email, phone, trip: selectedTrip, stop: selectedStop });

      const all = await sbFetch(`waitlist?trip=eq.${encodeURIComponent(selectedTrip)}&select=id&order=created_at.asc`);
      const pos = all ? all.length : 1;

      render('success', { email, trip: selectedTrip, stop: selectedStop, pos });

    } catch(err) {
      errorEl.style.display = 'block';
      btn.disabled = false;
      btn.textContent = 'Add me to the waitlist';
    }
  }

  render();

  // Modal for voucher
  function showModal(html, onConfirm) {
    const overlay = document.createElement('div');
    overlay.className = 'modal-overlay';
    overlay.innerHTML = html;
    document.body.appendChild(overlay);
    overlay.querySelector('.btn-cancel').onclick = () => overlay.remove();
    overlay.querySelector('.btn-confirm').onclick = () => { onConfirm(overlay); };
  }

  async function notifyVacancy(id, name, email, phone, trip, stop, btn) {
    if (!confirm(`Send vacancy notification to ${name}?`)) return;
    btn.disabled = true;
    btn.textContent = 'Sending...';
    try {
      const res = await fetch('/api/notify', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name, email, phone, trip, stop })
      });
      if (res.ok) { btn.textContent = 'Sent ✓'; btn.style.background = '#E3F2D4'; btn.style.color = '#3B6D11'; }
      else { const d = await res.json(); alert('Error: ' + d.error); btn.disabled = false; btn.textContent = 'Notify Vacancy'; }
    } catch(e) { alert('Error: ' + e.message); btn.disabled = false; btn.textContent = 'Notify Vacancy'; }
  }

  function sendVoucher(name, email, phone, btn) {
    showModal(`
      <div class="modal-box">
        <p class="modal-title">Send Uber Voucher to ${name}</p>
        <label style="font-size:13px;font-weight:500;color:#555;display:block;margin-bottom:6px;">Voucher link</label>
        <input type="text" id="voucher-link" placeholder="https://uber.com/voucher/..." style="width:100%;box-sizing:border-box;padding:9px 12px;border:1px solid #ddd;border-radius:8px;font-size:14px;outline:none;" />
        <div class="modal-actions">
          <button class="btn-cancel">Cancel</button>
          <button class="btn-confirm">Send</button>
        </div>
      </div>`, async (overlay) => {
        const link = overlay.querySelector('#voucher-link').value.trim();
        if (!link) { alert('Please enter a voucher link.'); return; }
        overlay.remove();
        btn.disabled = true;
        btn.textContent = 'Sending...';
        try {
          const res = await fetch('/api/voucher', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ name, email, phone, voucherLink: link })
          });
          if (res.ok) { btn.textContent = 'Sent ✓'; btn.style.background = '#EBF4FD'; btn.style.color = '#185FA5'; }
          else { const d = await res.json(); alert('Error: ' + d.error); btn.disabled = false; btn.textContent = 'Send Uber Voucher'; }
        } catch(e) { alert('Error: ' + e.message); btn.disabled = false; btn.textContent = 'Send Uber Voucher'; }
      });
  }
</script>
</body>
</html>
